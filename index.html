    /* === CRITICAL STYLES – same as last working version, no empty .faq-answer.open === */
    :root {

      --text-secondary: #4a4a4a;

    .teal { color: var(--accent-teal); }

    /* Section title underline - full width */
    .section-title {
      position: relative;
      display: inline-block;
      padding-bottom: 10px;
      cursor: default;
    }
    .section-title::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 2px;
      background: var(--accent-gold);
      transform: scaleX(0);
      transition: transform 0.3s ease;
      transform-origin: left;

    .section-title:hover::after {
      transform: scaleX(1);
    }

    /* Cards with gradient border on hover */
    .service-card, .equipment-card {
      background: var(--card-bg);
      border: 1px solid var(--border-light);
      border-radius: 1.5rem;
      padding: 2rem;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    .service-card::before, .equipment-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      border-radius: 1.5rem;
      padding: 2px;
      background: linear-gradient(135deg, var(--accent-gold), var(--accent-teal), var(--accent-gold));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .service-card:hover::before, .equipment-card:hover::before {
      opacity: 1;
    }
    .service-card:hover, .equipment-card:hover {
      border-color: transparent;
    }
    /* Icon animation */
    .service-card i, .equipment-card i {
      transition: transform 0.3s ease, color 0.3s ease;

      color: var(--accent-gold);
