<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iglisi Watch &amp; Key — Redirecting…</title>
  <meta name="robots" content="noindex, follow">
  <!-- Canonical is the default language -->
  <link rel="canonical" href="https://watch.al/en/">
  <link rel="alternate" hreflang="en"        href="https://watch.al/en/">
  <link rel="alternate" hreflang="sq"        href="https://watch.al/sq/">
  <link rel="alternate" hreflang="it"        href="https://watch.al/it/">
  <link rel="alternate" hreflang="x-default" href="https://watch.al/en/">
  <style>
    body { margin: 0; display: flex; align-items: center; justify-content: center;
           min-height: 100vh; font-family: sans-serif; background: #fcfcfc; }
    p { color: #888; font-size: 0.9rem; }
  </style>
</head>
<body>
  <p>Redirecting…</p>
  <!--
    shared.js geoDetect() runs here:
    - If localStorage has a preferred language → navigate to /lang/
    - Otherwise fetch ipapi.co → redirect to correct language
    - Fallback after 3 s timeout → /en/
  -->
  <script src="shared.js"></script>
</body>
</html>
