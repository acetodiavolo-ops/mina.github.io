<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iglisi Watch &amp; Key — Redirecting…</title>
  <meta name="robots" content="noindex, follow">
  <link rel="canonical" href="https://watch.al/en/">
  <link rel="alternate" hreflang="en"        href="https://watch.al/en/">
  <link rel="alternate" hreflang="sq"        href="https://watch.al/sq/">
  <link rel="alternate" hreflang="it"        href="https://watch.al/it/">
  <link rel="alternate" hreflang="x-default" href="https://watch.al/en/">
  <style>
    body {
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: sans-serif;
      background: #fcfcfc;
      gap: 1rem;
    }
    p { color: #888; font-size: 0.9rem; margin: 0; }
    /* Spinner — provides visual feedback during geo-detection */
    .loader {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #b4945c;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0%   { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="loader" aria-hidden="true"></div>
  <p>Redirecting…</p>
  <!--
    FIX: The old hard-coded setTimeout(() => navigateTo('en'), 2000) has been
    removed. It caused a race condition where slow networks would redirect to
    English before geo-detection finished, ignoring the user's actual locale.

    shared.js geoDetect() is now the sole redirect controller:
      1. If localStorage has a preferredLang → navigate immediately.
      2. Otherwise fetch ipapi.co → redirect to correct language.
      3. AbortController fires after 3 s → fallback to /en/.
  -->
  <script src="shared.js"></script>
</body>
</html>
